<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Day 1 - Button Styles</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            padding: 40px;
            background-color: #f9f9f9;
        }

        h1 {
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Primary Button */
        .btn-primary {
            background-color: #0077cc;
            color: white;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #005599;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Secondary Button */
        .btn-secondary {
            background-color: transparent;
            color: #0077cc;
            padding: 12px 24px;
            border: 2px solid #0077cc;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background-color: #0077cc;
            color: white;
            transform: translateY(-2px);
        }

        /* Danger Button */
        .btn-danger {
            background-color: #cc0000;
            color: white;
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-danger:hover {
            background-color: #990000;
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Disabled Button */
        .btn-disabled {
            background-color: #cccccc;
            color: #888888;
            padding: 12px 24px;
            border: none;
            cursor: not-allowed;
            font-size: 1rem;
        }

    </style>
</head>
<body>

    <h1>Button Styles</h1>

    <div class="button-group">
        <button class="btn-primary">Primary Button</button>
        <button class="btn-secondary">Secondary Button</button>
        <button class="btn-danger">Danger Button</button>
        <button class="btn-disabled" disabled>Disabled Button</button>
    </div>

</body>
</html>
